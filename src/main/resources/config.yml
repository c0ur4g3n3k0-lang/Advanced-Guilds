# ===================================
# AdvancedGuilds Configuration
# ===================================

database:
  mysql: false
  host: "localhost"
  port: 3306
  name: "advancedguilds"
  user: "root"
  password: "password"
  pool-size: 10

guild:
  creation-cost: 5000.0
  max-members: 50
  name:
    min-length: 3
    max-length: 16
    regex: "^[a-zA-Z0-9а-яА-Яa-zA-Z_]+$"
  tag:
    min-length: 2
    max-length: 5
    regex: "^[a-zA-Z0-9а-яА-Я_]+$"
  chat:
    format: "<dark_gray>[<gradient:gold:yellow>Гильдия</gradient>]</dark_gray> <gray>[<rank>]</gray> <white><player></white><dark_gray>:</dark_gray> <yellow><message></yellow>"
  forbidden-words:
    - "admin"
    - "fuck"
    - "shit"

# Дефолтные ранги при создании гильдии
default-ranks:
  - key: "leader"
    name: "Лидер"
    priority: 100
    permissions:
      - INVITE
      - KICK
      - MANAGE_SETTINGS
      - BANK_WITHDRAW
      - CHAT_ACCESS
  - key: "officer"
    name: "Офицер"
    priority: 75
    permissions:
      - INVITE
      - KICK
      - CHAT_ACCESS
  - key: "veteran"
    name: "Ветеран"
    priority: 25
    permissions:
      - CHAT_ACCESS
  - key: "recruit"
    name: "Рекрут"
    priority: 1
    permissions:
      - CHAT_ACCESS

messages:
  prefix: "<dark_gray>[<gradient:gold:yellow>Гильдии</gradient>]</dark_gray> "
